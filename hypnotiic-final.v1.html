<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypnotiic Media — Internal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#F5F3EF;--surface:#FFFFFF;--surface2:#EFEDE8;--border:#E0DBD3;--border2:#C4BDB3;--text:#18160F;--text2:#6A6258;--text3:#A09890;--purple:#6B5CE7;--purple-l:#EDE9FF;--green:#18A06E;--green-l:#E3F7EF;--blue:#2563EB;--blue-l:#EFF6FF;--coral:#E05A3A;--coral-l:#FEF0EC;--amber:#D97706;--amber-l:#FFFBEB;--red:#DC2626;--red-l:#FEF2F2;--pink:#DB2777;--pink-l:#FDF2F8;--r:10px;--rl:16px;--sh:0 1px 3px rgba(0,0,0,.07);--sh-md:0 4px 16px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:13px}
h1{font-size:22px;font-weight:600}h2{font-size:17px;font-weight:600}h3{font-size:14px;font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:var(--r);font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap;font-family:inherit;font-size:13px;line-height:1}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--text);color:#fff}.btn-primary:hover:not(:disabled){background:#333}.btn-primary:active:not(:disabled){transform:scale(.98)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border2)}.btn-secondary:hover:not(:disabled){background:var(--surface2)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-l);color:var(--red);border:1.5px solid #fca5a5}.btn-danger:hover:not(:disabled){background:#fee2e2}
.btn-success{background:var(--green-l);color:var(--green);border:1.5px solid #6ee7b7}
.btn-sm{padding:6px 12px;font-size:12px}.btn-icon{padding:7px;border-radius:8px;line-height:0}
.input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s}
.input:focus{border-color:var(--text)}.input::placeholder{color:var(--text3)}
textarea.input{resize:vertical;min-height:70px}
.label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
.card{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);padding:20px 22px;margin-bottom:12px}
.card:last-child{margin-bottom:0}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:11px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .12s;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--sh)}
.wrap{max-width:880px;margin:0 auto;padding:28px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:680px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.wrap{padding:16px 12px}}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);color:var(--text2);font-size:11px;padding:3px 9px;border-radius:20px;margin:2px;border:1px solid var(--border)}
.pill-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0;display:flex;align-items:center}
.pill-x:hover{color:var(--red)}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.b-purple{background:var(--purple-l);color:var(--purple)}.b-green{background:var(--green-l);color:var(--green)}.b-blue{background:var(--blue-l);color:var(--blue)}.b-amber{background:var(--amber-l);color:var(--amber)}.b-red{background:var(--red-l);color:var(--red)}.b-gray{background:var(--surface2);color:var(--text2)}.b-pink{background:var(--pink-l);color:var(--pink)}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:14px;border:1px solid;line-height:1.5}
.alert-warn{background:var(--amber-l);border-color:#fcd34d;color:#78350f}
.alert-info{background:var(--blue-l);border-color:#93c5fd;color:#1e3a8a}
.alert-success{background:var(--green-l);border-color:#6ee7b7;color:#064e3b}
.alert-error{background:var(--red-l);border-color:#fca5a5;color:#7f1d1d}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
td{padding:10px;border-bottom:1px solid var(--surface2);color:var(--text);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg)}
.dropzone{border:2px dashed var(--border2);border-radius:var(--rl);padding:32px;text-align:center;background:var(--bg);transition:all .15s;cursor:pointer}
.dropzone.over{border-color:var(--purple);background:var(--purple-l)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:200;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--rl);width:100%;max-width:560px;margin:auto;box-shadow:var(--sh-md)}
.modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);border-radius:var(--rl) var(--rl) 0 0;z-index:1}
.modal-body{padding:22px;max-height:72vh;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.stepper{display:flex;align-items:flex-start;margin-bottom:28px}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.step-item:not(:last-child)::after{content:'';position:absolute;top:13px;left:calc(50% + 15px);right:calc(-50% + 15px);height:2px;background:var(--border)}
.step-item.done:not(:last-child)::after{background:var(--text)}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:2px solid var(--border);background:var(--surface);color:var(--text2);z-index:1;position:relative;transition:all .2s}
.step-item.done .step-dot{background:var(--text);border-color:var(--text);color:#fff}
.step-item.active .step-dot{border-color:var(--text);color:var(--text)}
.step-label{font-size:10px;color:var(--text3);margin-top:5px;text-align:center;font-weight:500;max-width:60px}
.step-item.active .step-label,.step-item.done .step-label{color:var(--text2)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;box-shadow:var(--sh-md);pointer-events:none;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease}
hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.section-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px}
.score-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
.score-fill{height:100%;border-radius:2px;transition:width .4s}
.ig-metric-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.ig-metric-label{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.ig-metric-value{font-size:28px;font-weight:600;color:var(--text);line-height:1.1;margin-bottom:2px}
.ig-metric-sub{font-size:11px;color:var(--text3)}
.ig-bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface2)}
.ig-bar-row:last-child{border-bottom:none}
.ig-bar-label{font-size:12px;color:var(--text2);min-width:110px}
.ig-bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.ig-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.ig-bar-val{font-size:12px;font-weight:500;color:var(--text);min-width:60px;text-align:right}
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.post-thumb{aspect-ratio:1;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;position:relative;overflow:hidden;cursor:pointer;transition:transform .1s;text-decoration:none}
.post-thumb:hover{transform:scale(1.02)}
.post-views{font-size:18px;font-weight:700;color:var(--text)}
.post-type-badge{position:absolute;top:7px;right:7px}
.empty{text-align:center;padding:40px 20px}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.fc{display:flex;align-items:center}.fb{display:flex;align-items:center;justify-content:space-between}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mono{font-family:'DM Mono',monospace}
.text-sm{font-size:12px}.text-xs{font-size:11px}.muted{color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-box{background:#0f1117;border-radius:var(--r);padding:12px 14px;height:110px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:11px}
.log-line{color:#4ade80;margin-bottom:2px}.log-warn{color:#fbbf24;margin-bottom:2px}.log-err{color:#f87171;margin-bottom:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// SUPABASE INIT
// ═══════════════════════════════════════════════════════════════
const { createClient } = supabase;
const SB = createClient(
  'https://dvknzfhsgnywevhmsgns.supabase.co',
  'sb_publishable_ehMDG_4ohfbN0XDjkvB8_A_yIwdtOgM'
);

// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════
const COLORS=[{color:'#6B5CE7',light:'#EDE9FF',name:'Purple'},{color:'#18A06E',light:'#E3F7EF',name:'Green'},{color:'#2563EB',light:'#EFF6FF',name:'Blue'},{color:'#E05A3A',light:'#FEF0EC',name:'Coral'},{color:'#D97706',light:'#FFFBEB',name:'Amber'},{color:'#DB2777',light:'#FDF2F8',name:'Pink'}];
const PKGS=['Starter','Growth','Dominant Expert System'];
const FREQS=['Daily','6x per week','5x per week','4x per week','3x per week','2x per week','Weekly'];
const PLATFORMS=['Instagram','TikTok','YouTube Shorts','Facebook','LinkedIn'];

let USER=null;
let CLIENTS=[];
let A={screen:'loading',clientId:null,tab:'overview',modal:null,md:{},wiz:{step:0,data:{}},disc:{},anal:{},rep:{}};

// API keys stay in localStorage — sensitive, device-specific
function getKeys(){ try{ return JSON.parse(localStorage.getItem('hm_keys')||'{}'); }catch(e){ return {}; } }
function saveKeys(k){ localStorage.setItem('hm_keys',JSON.stringify(k)); }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmt(n){ return Number(n||0).toLocaleString(); }
function fmtK(n){ n=Number(n||0); return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n); }
function cc(){ return CLIENTS.find(c=>c.id===A.clientId)||null; }
function set(u){ Object.assign(A,u); render(); }

function toast(msg,type='ok'){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='toast';
  el.style.background=type==='err'?'var(--red)':type==='warn'?'var(--amber)':'var(--text)';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

function addLog(msg,type=''){
  const box=document.querySelector('.log-box');
  if(!box) return;
  const d=document.createElement('div');
  d.className=type?'log-'+type:'log-line';
  d.textContent='['+new Date().toLocaleTimeString('en-GB')+'] '+msg;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE DATA FUNCTIONS
// ═══════════════════════════════════════════════════════════════
async function loadClients(){
  const {data,error}=await SB.from('clients').select('*').order('created_at',{ascending:true});
  if(error){ console.error(error); return; }
  CLIENTS=data||[];
}

async function saveClient(client){
  const payload={
    id:client.id, name:client.name, email:client.email||'',
    ig_handle:client.ig_handle||'', niche:client.niche||'',
    target:client.target||'', pillars:client.pillars||[],
    hashtags:client.hashtags||[], keywords:client.keywords||[],
    platforms:client.platforms||[], posting_freq:client.posting_freq||'',
    package:client.package||'', notes:client.notes||'',
    color:client.color||'', light:client.light||'',
    competitors:client.competitors||[], reports:client.reports||[],
    owner_id:USER.id
  };
  const existing=CLIENTS.find(c=>c.id===client.id);
  if(existing){
    const {error}=await SB.from('clients').update(payload).eq('id',client.id);
    if(error) throw error;
  } else {
    const {error}=await SB.from('clients').insert(payload);
    if(error) throw error;
  }
  await loadClients();
}

async function deleteClientDB(id){
  const {error}=await SB.from('clients').delete().eq('id',id);
  if(error) throw error;
  await loadClients();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  if(!root) return;
  document.querySelectorAll('.overlay,.toast').forEach(e=>e.remove());
  if(A.screen==='loading') root.innerHTML=rLoading();
  else if(A.screen==='login') root.innerHTML=rLogin();
  else if(A.screen==='dash') root.innerHTML=rDash();
  else if(A.screen==='client') root.innerHTML=rClient();
  else if(A.screen==='wizard') root.innerHTML=rWizard();
  else if(A.screen==='settings') root.innerHTML=rSettings();
  if(A.modal){ const ov=document.createElement('div'); ov.className='overlay'; ov.innerHTML=getModal(); ov.onclick=e=>{if(e.target===ov)closeModal()}; document.body.appendChild(ov); }
  bind();
}

// ═══════════════════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════════════════
function rLoading(){
  return `<div class="loading-screen">
    <div style="width:40px;height:40px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px">H</div>
    <div style="font-size:13px;color:var(--text2)">Loading...</div>
  </div>`;
}

function rLogin(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px">
    <div style="width:100%;max-width:340px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="width:44px;height:44px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;margin:0 auto 12px">H</div>
        <h1 style="font-size:18px;margin-bottom:4px">Hypnotiic Media</h1>
        <p class="muted text-sm">Internal tools — authorised access only</p>
      </div>
      <div class="card">
        <div class="field"><label class="label">Email</label><input class="input" id="l-email" type="email" placeholder="you@hypnotiicmedia.com"></div>
        <div class="field"><label class="label">Password</label><input class="input" id="l-pass" type="password" placeholder="••••••••"></div>
        <div id="l-err" class="alert alert-error" style="display:none">Incorrect email or password</div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()" id="l-btn">Sign in</button>
        <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:10px">Contact Max to get access</p>
      </div>
    </div>
  </div>`;
}

async function doLogin(){
  const email=document.getElementById('l-email')?.value?.trim()||'';
  const pass=document.getElementById('l-pass')?.value||'';
  if(!email||!pass) return;
  const btn=document.getElementById('l-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span>Signing in...'; }
  const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){
    const err=document.getElementById('l-err');
    if(err) err.style.display='block';
    if(btn){ btn.disabled=false; btn.innerHTML='Sign in'; }
    return;
  }
  USER=data.user;
  await loadClients();
  set({screen:'dash'});
}

async function doLogout(){
  await SB.auth.signOut();
  USER=null; CLIENTS=[];
  set({screen:'login'});
}

// ─── NAV ──────────────────────────────────────────────────────
function rNav(crumb){
  return `<nav class="nav">
    <div class="fc g10">
      <div style="width:30px;height:30px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">H</div>
      <span style="font-weight:600;font-size:14px">Hypnotiic Media</span>
      <span style="font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:20px">Internal</span>
      ${crumb?'<span style="color:var(--border2)">/</span><span style="font-size:13px;color:var(--text2)">'+crumb+'</span>':''}
    </div>
    <div class="fc g8">
      <span style="font-size:11px;color:var(--text3)">${USER?.email||''}</span>
      <button class="btn btn-ghost btn-sm" onclick="set({screen:'settings'})">Settings</button>
      <button class="btn btn-ghost btn-sm" onclick="set({screen:'dash',clientId:null})">Dashboard</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </nav>`;
}

// ─── DASHBOARD ────────────────────────────────────────────────
function rDash(){
  const cards=CLIENTS.map(function(c){
    return '<button onclick="set({screen:\'client\',clientId:\''+c.id+'\',tab:\'overview\'})"'
      +' style="text-align:left;padding:20px;border-radius:16px;border:1.5px solid '+c.color+'35;background:'+c.light+';cursor:pointer;width:100%;transition:all .15s;display:block"'
      +' onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 6px 20px rgba(0,0,0,.09)\'"'
      +' onmouseout="this.style.transform=\'none\';this.style.boxShadow=\'none\'">'
      +'<div class="fc g8 mb12"><div class="dot" style="background:'+c.color+'"></div>'
      +'<span class="badge" style="background:'+c.color+'20;color:'+c.color+'">'+(c.package||'Active')+'</span></div>'
      +'<div style="font-size:18px;font-weight:600;margin-bottom:4px">'+c.name+'</div>'
      +'<div style="font-size:12px;color:var(--text2);margin-bottom:10px">'+c.niche+'</div>'
      +'<div class="fc g12">'
      +'<span style="font-size:11px;color:var(--text3)">'+((c.competitors||[]).filter(function(x){return x.status==='approved';}).length)+' competitors</span>'
      +'<span style="font-size:11px;color:var(--text3)">'+((c.pillars||[]).length)+' pillars</span>'
      +'<span style="font-size:11px;color:var(--text3)">'+(c.posting_freq||'—')+'</span>'
      +'</div></button>';
  }).join('');

  return '<div class="fade-up">'+rNav()
    +'<div class="wrap">'
    +'<div class="fb mb20">'
    +'<div><h1 style="margin-bottom:3px">Dashboard</h1><p class="muted text-sm">'+CLIENTS.length+' active client'+(CLIENTS.length!==1?'s':'')+'</p></div>'
    +'<button class="btn btn-primary" onclick="startWiz()">+ Add new client</button>'
    +'</div>'
    +'<div class="grid3">'
    +cards

const STEPS=[{l:'Basic info'},{l:'Niche'},{l:'Content'},{l:'Search terms'},{l:'Review'}];

function startWiz(){

}

function rWizard(){
  const {step,data}=A.wiz;
  const stepper=STEPS.map(function(s,i){
    const cls=i<step?'done':i===step?'active':'';
    return '<div class="step-item '+cls+'"><div class="step-dot">'+(i<step?'✓':i+1)+'</div><div class="step-label">'+s.l+'</div></div>';

async function approveComp(cid,u){
  const c=CLIENTS.find(function(x){ return x.id===cid; }); if(!c) return;
  c.competitors=c.competitors.map(function(x){ return x.username===u?{...x,status:'approved'}:x; });
  try { await saveClient(c); render(); toast('@'+u+' approved'); } catch(err){ toast('Error: '+err.message,'err'); }
}

async function removeComp(cid,u){
  if(!confirm('Remove @'+u+'?')) return;
  const c=CLIENTS.find(function(x){ return x.id===cid; }); if(!c) return;
  c.competitors=c.competitors.filter(function(x){ return x.username!==u; });
  try { await saveClient(c); render(); toast('Removed'); } catch(err){ toast('Error: '+err.message,'err'); }
}

function compDrop(e,cid){ e.preventDefault(); document.getElementById('comp-dz')?.classList.remove('over'); const f=e.dataTransfer?.files?.[0]; if(f) compCSV(f,cid); }
function compFile(e,cid){ const f=e.target?.files?.[0]; if(f) compCSV(f,cid); }
function compCSV(file,cid){
  const r=new FileReader();
  r.onload=async function(ev){
    const lines=ev.target.result.trim().split('\n');
    const heads=lines[0].toLowerCase().split(',').map(function(h){ return h.trim().replace(/"/g,''); });
    const uc=heads.findIndex(function(h){ return ['username','handle','account','user'].some(function(p){ return h.includes(p); }); });
    const fc=heads.findIndex(function(h){ return h.includes('follow'); });
    if(uc<0){ toast('Need a username column','err'); return; }
    const c=CLIENTS.find(function(x){ return x.id===cid; }); if(!c) return;
    let added=0;
    for(const line of lines.slice(1)){
      const cols=line.split(',').map(function(x){ return x.trim().replace(/"/g,'').replace('@',''); });
      const u=cols[uc]?.trim(); if(!u||u.length<2) continue;
      if(c.competitors.find(function(x){ return x.username===u; })) continue;
      c.competitors.push({username:u,status:'pending',followers:fc>=0?parseInt(cols[fc].replace(/,/g,''))||0:0,score:0,viral_posts:0,best_views:0});
      added++;
    }
    try { await saveClient(c); render(); toast(added+' uploaded — approve above'); } catch(err){ toast('Error: '+err.message,'err'); }
  };
  r.readAsText(file);
}

  const ds=A.disc[c.id]||{};
  const results=ds.results||[]; const running=ds.running||false;
  const hasKey=!!getKeys().apify;
  const hasTerms=(c.hashtags||[]).length>0||(c.keywords||[]).length>0;
  const rows=results.map(function(a,i){

async function realDisc(cid,c){
  const token=getKeys().apify;
  const log=function(m,t){ A.disc[cid].progress=m; render(); addLog(m,t); };
  try {
    const accounts={};
    for(const tag of (c.hashtags||[]).slice(0,3)){
      log('Scraping #'+tag+'...');
      const res=await fetch('https://api.apify.com/v2/acts/apify~instagram-hashtag-scraper/runs?token='+token,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hashtags:[tag],resultsLimit:30,addParentData:true})});
      if(!res.ok) continue;
      const run=await res.json(); const runId=run?.data?.id; if(!runId) continue;
      let dsId='';
      for(let i=0;i<36;i++){
        await new Promise(function(r){ setTimeout(r,5000); });
        const s=await fetch('https://api.apify.com/v2/actor-runs/'+runId+'?token='+token);
        const sd=await s.json(); const st=sd?.data?.status;
        log('Hashtag #'+tag+': '+st);
        if(st==='SUCCEEDED'){dsId=sd.data.defaultDatasetId;break;}
        if(['FAILED','ABORTED','TIMED-OUT'].includes(st)) break;
      }
      if(!dsId) continue;
      const items=await (await fetch('https://api.apify.com/v2/datasets/'+dsId+'/items?token='+token)).json();
      for(const item of (Array.isArray(items)?items:[])){
        const u=item?.ownerUsername; if(!u||accounts[u]) continue;
        const f=item?.ownerFollowersCount||0; if(f<3000||f>3000000) continue;
        const eng=f>0?(((item?.likesCount||0)+(item?.commentsCount||0))/f*100):0;
        if(eng<0.2||eng>20) continue;
        accounts[u]={username:u,followers:f,bio:(item?.ownerBio||''),fullName:(item?.ownerFullName||''),engagement:Math.round(eng*100)/100};
      }
      log('Total so far: '+Object.keys(accounts).length);
    }
    log('Scoring '+Object.keys(accounts).length+' accounts...');
    const kws=[(c.niche||'').toLowerCase(),...(c.pillars||[]).map(function(p){ return p.toLowerCase(); }),...(c.keywords||[]).map(function(k){ return k.toLowerCase(); })];
    const scored=Object.values(accounts).map(function(a){
      const bio=(a.bio+' '+a.fullName).toLowerCase();
      let ns=0; kws.forEach(function(kw){ if(kw.length>3&&bio.includes(kw)) ns+=3; }); ns=Math.min(ns,35);
      const es=a.engagement>=3?40:a.engagement>=1.5?30:a.engagement>=0.8?20:10;
      const fs=a.followers>=10000&&a.followers<=500000?15:a.followers>=5000?8:3;
      return {username:a.username,followers:a.followers,score:Math.min(Math.round(es+ns+fs),100),viral_posts:Math.max(1,Math.floor(a.engagement/2)),best_views:Math.floor(a.followers*a.engagement/100*8)};
    }).sort(function(a,b){ return b.score-a.score; }).slice(0,10);
    A.disc[cid].running=false; A.disc[cid].results=scored; render(); toast('Discovery complete — '+scored.length+' found');
  } catch(err){ A.disc[cid].running=false; render(); toast('Error: '+err.message,'err'); }
}

async function addFromDisc(cid,u,f,s,vp,bv){
  const c=CLIENTS.find(function(x){ return x.id===cid; }); if(!c) return;
  if(c.competitors.find(function(x){ return x.username===u; })){ toast('Already in list','warn'); return; }
  c.competitors.push({username:u,followers:f,score:s,viral_posts:vp,best_views:bv,status:'approved'});
  if(A.disc[cid]?.results) A.disc[cid].results=A.disc[cid].results.filter(function(x){ return x.username!==u; });
  try { await saveClient(c); render(); toast('@'+u+' approved'); } catch(err){ toast('Error: '+err.message,'err'); }
}

async function addAllDisc(cid){
  const c=CLIENTS.find(function(x){ return x.id===cid; });
  const results=A.disc[cid]?.results||[];
  if(!c||!results.length) return;
  let added=0;
  for(const a of results){ if(!c.competitors.find(function(x){ return x.username===a.username; })){ c.competitors.push({...a,status:'approved'}); added++; } }
  A.disc[cid].results=[];
  try { await saveClient(c); render(); toast(added+' added'); } catch(err){ toast('Error: '+err.message,'err'); }
}

  A.rep[cid].data={month,notes,total_posts:posts,total_views:avgV*posts,total_likes:avgL*posts,total_comments:avgC*posts,avg_views_reel:avgV,avg_likes:avgL,avg_comments:avgC,engagement_rate:((avgL+avgC)/f*100).toFixed(2),
    note:'Demo data — add Apify key and client Instagram handle for real analytics.',
    top_posts:[{type:'Reel',views:avgV*4.2},{type:'Reel',views:avgV*2.8},{type:'Carousel',views:0,likes:avgL*3.1},{type:'Reel',views:avgV*1.9},{type:'Image',views:0,likes:avgL*1.4},{type:'Reel',views:avgV*1.2}],
    insights:['Published '+posts+' posts — '+(posts/4).toFixed(1)+' per week on average','Reels averaged '+fmtK(avgV)+' views — strong reach for this follower count','Engagement rate of '+((avgL+avgC)/f*100).toFixed(2)+'% — '+(((avgL+avgC)/f*100)>=2?'above':'building toward')+' the 2% benchmark','Comments-to-likes ratio is healthy — audience engages, not just watches','Best performing content was 4.2x the account average']};
  render(); toast('Demo report built');
}

async function realReport(cid,c,month,notes){
  const token=getKeys().apify;
  try {
    const res=await fetch('https://api.apify.com/v2/acts/apify~instagram-scraper/runs?token='+token,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({directUrls:['https://www.instagram.com/'+c.ig_handle+'/'],resultsType:'posts',resultsLimit:40,addParentData:true})});
    if(!res.ok) throw new Error('Apify error');
    const run=await res.json(); const runId=run?.data?.id; if(!runId) throw new Error('No run ID');
    let dsId='';
    for(let i=0;i<60;i++){
      await new Promise(function(r){ setTimeout(r,5000); });
      const s=await fetch('https://api.apify.com/v2/actor-runs/'+runId+'?token='+token);
      const sd=await s.json(); const st=sd?.data?.status;
      A.rep[cid].progress='Status: '+st; render();
      if(st==='SUCCEEDED'){dsId=sd.data.defaultDatasetId;break;}
      if(['FAILED','ABORTED','TIMED-OUT'].includes(st)) throw new Error('Run failed: '+st);
    }
    if(!dsId) throw new Error('Timed out');
    const items=await (await fetch('https://api.apify.com/v2/datasets/'+dsId+'/items?token='+token)).json();
    const ago=new Date(); ago.setDate(ago.getDate()-30);
    const posts30=items.filter(function(p){ try{ return new Date(p.timestamp)>=ago; }catch(e){ return true; } });
    const allP=posts30.length>0?posts30:items.slice(0,30);
    const tV=allP.reduce(function(s,p){ return s+(p.videoViewCount||0); },0);
    const tL=allP.reduce(function(s,p){ return s+(p.likesCount||0); },0);
    const tC=allP.reduce(function(s,p){ return s+(p.commentsCount||0); },0);
    const f=allP[0]?.ownerFollowersCount||1;
    const aV=allP.length?Math.round(tV/allP.length):0; const aL=allP.length?Math.round(tL/allP.length):0; const aC=allP.length?Math.round(tC/allP.length):0;
    const topPosts=allP.map(function(p){ return {type:p.type==='Video'||p.type==='Reel'?'Reel':p.type==='Sidecar'?'Carousel':'Image',views:p.videoViewCount||0,likes:p.likesCount||0,caption:(p.caption||'').slice(0,60)}; }).sort(function(a,b){ return (b.views||b.likes)-(a.views||a.likes); }).slice(0,6);
    A.rep[cid].running=false;
    A.rep[cid].data={month,notes,total_posts:allP.length,total_views:tV,total_likes:tL,total_comments:tC,avg_views_reel:aV,avg_likes:aL,avg_comments:aC,engagement_rate:((aL+aC)/f*100).toFixed(2),top_posts:topPosts,
      note:'Shares and saves require Instagram Business API access — contact us to set this up.',
      insights:['Published '+allP.length+' posts in 30 days — '+(allP.length/4).toFixed(1)+' per week','Reels averaged '+fmtK(aV)+' views','Engagement rate of '+((aL+aC)/f*100).toFixed(2)+'%','Total of '+fmtK(tC)+' comments this month','Best post achieved '+fmtK(topPosts[0]?topPosts[0].views||topPosts[0].likes:0)+' '+(topPosts[0]?.type==='Reel'?'views':'likes')]};
    render(); toast('Report built from real data');
  } catch(err){ A.rep[cid].running=false; await demoReport(cid,c,month,notes); toast('API error — demo shown','err'); }
}

function openModal(type){ A.modal=type; A.md={}; if(type==='edit'){ const c=cc(); if(c) A.md={...c,pillars:[...(c.pillars||[])],hashtags:[...(c.hashtags||[])],keywords:[...(c.keywords||[])],platforms:[...(c.platforms||[])]}; } render(); }
function closeModal(){ A.modal=null; A.md={}; render(); }

function getModal(){
  if(A.modal==='edit') return editModal();
  if(A.modal==='add-comp') return addCompModal();
  if(A.modal==='send-report') return sendReportModal();
  return '';
}

  const kwHtml=(d.keywords||[]).map(function(k){ return '<span class="pill">'+k+'<button class="pill-x" onclick="rmMK(\''+k+'\')">×</button></span>'; }).join('');
  const colorPicker=COLORS.map(function(c,i){ return '<button type="button" onclick="setMC('+i+')" style="width:24px;height:24px;border-radius:50%;background:'+c.color+';border:'+(d.color===c.color?'3px solid var(--text)':'2px solid transparent')+';cursor:pointer;transition:border .12s"></button>'; }).join('');

    +'<div class="modal-head"><h3>Edit — '+d.name+'</h3><button class="btn btn-ghost btn-icon" onclick="closeModal()">×</button></div>'
    +'<div class="modal-body">'

    +'<div class="field"><label class="label">Target audience</label><textarea class="input" id="ec-ta" rows="2">'+(d.target||'')+'</textarea></div>'
    +'<div class="grid2"><div class="field"><label class="label">Posting freq</label><select class="input" id="ec-fr">'+FREQS.map(function(f){ return '<option '+(d.posting_freq===f?'selected':'')+'>'+f+'</option>'; }).join('')+'</select></div>'

    +'<div class="field"><label class="label">Hashtags</label><div style="min-height:28px;margin-bottom:7px">'+(hashHtml||'<span class="text-xs muted">None</span>')+'</div><div class="fc g8"><input class="input" id="ec-ha" placeholder="businesscoach..." style="flex:1" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addMH()}"><button class="btn btn-secondary btn-sm" onclick="addMH()">Add</button></div></div>'

function addMP(){ const i=document.getElementById('ec-pi'); if(!i) return; const v=i.value.trim(); if(!v) return; if(!A.md.pillars.includes(v)) A.md.pillars.push(v); i.value=''; render(); setTimeout(function(){ document.getElementById('ec-pi')?.focus(); },40); }
function rmMP(v){ A.md.pillars=A.md.pillars.filter(function(x){ return x!==v; }); render(); }
function addMH(){ const i=document.getElementById('ec-ha'); if(!i) return; const v=i.value.trim().replace('#','').replace(/\s/g,''); if(!v) return; if(!A.md.hashtags.includes(v)) A.md.hashtags.push(v); i.value=''; render(); setTimeout(function(){ document.getElementById('ec-ha')?.focus(); },40); }
function rmMH(v){ A.md.hashtags=A.md.hashtags.filter(function(x){ return x!==v; }); render(); }
function addMK(){ const i=document.getElementById('ec-kw'); if(!i) return; const v=i.value.trim(); if(!v) return; if(!A.md.keywords.includes(v)) A.md.keywords.push(v); i.value=''; render(); setTimeout(function(){ document.getElementById('ec-kw')?.focus(); },40); }
function rmMK(v){ A.md.keywords=A.md.keywords.filter(function(x){ return x!==v; }); render(); }
function toggleMP(pl){ const idx=(A.md.platforms||[]).indexOf(pl); if(idx>=0) A.md.platforms.splice(idx,1); else A.md.platforms.push(pl); }
function setMC(i){ A.md.color=COLORS[i].color; A.md.light=COLORS[i].light; render(); }

async function saveEdit(){
  const d=A.md;
  const btn=document.getElementById('save-edit-btn');
  if(btn){ btn.disabled=true; btn.textContent='Saving...'; }
  const updates={
    name:document.getElementById('ec-n')?.value?.trim()||d.name,
    email:document.getElementById('ec-e')?.value?.trim()||'',
    ig_handle:document.getElementById('ec-ig')?.value?.trim().replace('@','')||'',
    niche:document.getElementById('ec-ni')?.value?.trim()||'',
    target:document.getElementById('ec-ta')?.value?.trim()||'',
    posting_freq:document.getElementById('ec-fr')?.value||d.posting_freq,
    package:document.getElementById('ec-pk')?.value||d.package,
    notes:document.getElementById('ec-no')?.value?.trim()||'',
    pillars:[...(d.pillars||[])], hashtags:[...(d.hashtags||[])],
    keywords:[...(d.keywords||[])], platforms:[...(d.platforms||[])],
    color:d.color||cc()?.color, light:d.light||cc()?.light,
  };
  try {
    const c=CLIENTS.find(function(x){ return x.id===d.id; });
    if(c) Object.assign(c,updates);
    await saveClient({...d,...updates});
    closeModal(); toast('Client updated');
  } catch(err){ toast('Error: '+err.message,'err'); if(btn){ btn.disabled=false; btn.textContent='Save changes'; } }
}

async function saveComp(){

  if(c.competitors.find(function(x){ return x.username===u; })){ toast('Already in list','warn'); return; }

  try { await saveClient(c); closeModal(); toast('@'+u+' added'); } catch(err){ toast('Error: '+err.message,'err'); }
}

async function init(){
  render(); // show loading screen
  const {data:{session}}=await SB.auth.getSession();
  if(session?.user){
    USER=session.user;
    await loadClients();
    set({screen:'dash'});
  } else {
    set({screen:'login'});
  }
  // Listen for auth changes
  SB.auth.onAuthStateChange(async function(event,session){
    if(event==='SIGNED_IN'&&session?.user){
      USER=session.user;
      await loadClients();
      set({screen:'dash'});
    } else if(event==='SIGNED_OUT'){
      USER=null; CLIENTS=[];
      set({screen:'login'});
    }
  });
}
