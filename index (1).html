<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypnotiic Media</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#F5F3EF;--sur:#fff;--sur2:#EFEDE8;
  --bor:#E0DBD3;--bor2:#C4BDB3;
  --tx:#18160F;--tx2:#6A6258;--tx3:#A09890;
  --pu:#6B5CE7;--pul:#EDE9FF;
  --gr:#18A06E;--grl:#E3F7EF;
  --bl:#2563EB;--bll:#EFF6FF;
  --re:#DC2626;--rel:#FEF2F2;
  --am:#D97706;--aml:#FFFBEB;
  --pk:#DB2777;--pkl:#FDF2F8;
  --r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:13px}

/* --- BUTTONS --- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--tx);color:#fff}.bp:hover:not(:disabled){background:#2a2a2a}
.bs{background:var(--sur);color:var(--tx);border:1.5px solid var(--bor2)}.bs:hover:not(:disabled){background:var(--sur2)}
.bg{background:transparent;color:var(--tx2);border:1.5px solid var(--bor)}.bg:hover:not(:disabled){background:var(--sur2);color:var(--tx)}
.bd{background:var(--rel);color:var(--re);border:1.5px solid #fca5a5}.bd:hover:not(:disabled){background:#fee2e2}
.bsu{background:var(--grl);color:var(--gr);border:1.5px solid #6ee7b7}
.sm{padding:6px 12px;font-size:12px}
.ic{padding:7px;border-radius:8px}

/* --- INPUTS --- */
.inp{width:100%;padding:9px 11px;border:1.5px solid var(--bor);border-radius:var(--r);background:var(--sur);color:var(--tx);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--tx)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:vertical;min-height:72px}
.lbl{font-size:11px;font-weight:600;color:var(--tx2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fld{margin-bottom:14px}

/* --- CARDS --- */
.card{background:var(--sur);border-radius:var(--rl);border:1px solid var(--bor);padding:20px 22px;margin-bottom:12px}
.card:last-child{margin-bottom:0}

/* --- NAV --- */
.nav{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}

/* --- TABS --- */
.tabs{display:flex;gap:2px;background:var(--sur2);padding:3px;border-radius:11px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--tx2);font-family:inherit;transition:all .12s;white-space:nowrap}
.tab.on{background:var(--sur);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* --- LAYOUT --- */
.wrap{max-width:880px;margin:0 auto;padding:28px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}.wrap{padding:16px 12px}}

/* --- PILLS --- */
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--sur2);color:var(--tx2);font-size:11px;padding:3px 9px;border-radius:20px;margin:2px;border:1px solid var(--bor)}
.px{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:14px;line-height:1;display:flex;align-items:center;padding:0}
.px:hover{color:var(--re)}

/* --- BADGES --- */
.bdg{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.bpu{background:var(--pul);color:var(--pu)}.bgr{background:var(--grl);color:var(--gr)}.bbl{background:var(--bll);color:var(--bl)}.bgy{background:var(--sur2);color:var(--tx2)}.bpk{background:var(--pkl);color:var(--pk)}

/* --- ALERTS --- */
.al{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:14px;border:1px solid;line-height:1.5}
.aw{background:var(--aml);border-color:#fcd34d;color:#78350f}
.ai{background:var(--bll);border-color:#93c5fd;color:#1e3a8a}
.as{background:var(--grl);border-color:#6ee7b7;color:#064e3b}
.ae{background:var(--rel);border-color:#fca5a5;color:#7f1d1d}

/* --- TABLE --- */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--tx3);padding:8px 10px;border-bottom:1px solid var(--bor);text-transform:uppercase;letter-spacing:.05em}
td{padding:10px;border-bottom:1px solid var(--sur2);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

/* --- DROPZONE --- */
.dz{border:2px dashed var(--bor2);border-radius:var(--rl);padding:28px;text-align:center;background:var(--bg);transition:all .15s;cursor:pointer}
.dz.ov{border-color:var(--pu);background:var(--pul)}

/* --- MODAL --- */
.ov-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:200;overflow-y:auto}
.modal{background:var(--sur);border-radius:var(--rl);width:100%;max-width:560px;margin:auto;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.mh{padding:16px 22px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sur);border-radius:var(--rl) var(--rl) 0 0}
.mb{padding:22px;max-height:72vh;overflow-y:auto}
.mf{padding:14px 22px;border-top:1px solid var(--bor);display:flex;gap:8px;justify-content:flex-end}

/* --- STEPPER --- */
.stepper{display:flex;align-items:flex-start;margin-bottom:28px}
.si{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.si:not(:last-child)::after{content:'';position:absolute;top:13px;left:calc(50% + 15px);right:calc(-50% + 15px);height:2px;background:var(--bor)}
.si.dn:not(:last-child)::after{background:var(--tx)}
.sdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:2px solid var(--bor);background:var(--sur);color:var(--tx2);z-index:1;position:relative;transition:all .2s}
.si.dn .sdot{background:var(--tx);border-color:var(--tx);color:#fff}
.si.ac .sdot{border-color:var(--tx);color:var(--tx)}
.slbl{font-size:10px;color:var(--tx3);margin-top:5px;text-align:center;font-weight:500}
.si.ac .slbl,.si.dn .slbl{color:var(--tx2)}

/* --- SPINNER --- */
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.spd{border-color:rgba(0,0,0,.1);border-top-color:var(--tx)}

/* --- TOAST --- */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;pointer-events:none;animation:tIn .2s ease;box-shadow:0 4px 16px rgba(0,0,0,.15)}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .2s ease}

/* --- MISC --- */
hr{border:none;border-top:1px solid var(--bor);margin:18px 0}
.sh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fc{display:flex;align-items:center}
.fb{display:flex;align-items:center;justify-content:space-between}
.mono{font-family:'DM Mono',monospace}
.xs{font-size:11px}.sm-t{font-size:12px}.mu{color:var(--tx2)}

/* --- SCORE BAR --- */
.sbar{height:4px;background:var(--sur2);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
.sfill{height:100%;border-radius:2px;transition:width .4s}

/* --- IG REPORT --- */
.igmc{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:16px 18px}
.igml{font-size:11px;color:var(--tx3);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.igmv{font-size:26px;font-weight:600;line-height:1.1;margin-bottom:2px}
.igms{font-size:11px;color:var(--tx3)}
.igbr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--sur2)}
.igbr:last-child{border-bottom:none}
.igbl{font-size:12px;color:var(--tx2);min-width:120px}
.igbt{flex:1;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden}
.igbf{height:100%;border-radius:3px;transition:width .6s}
.igbv{font-size:12px;font-weight:500;min-width:60px;text-align:right}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pth{aspect-ratio:1;border-radius:8px;background:var(--sur2);border:1px solid var(--bor);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;position:relative;overflow:hidden;text-decoration:none}
.pth:hover{opacity:.85}
.ptb{position:absolute;top:6px;right:6px}
.log{background:#0f1117;border-radius:var(--r);padding:12px;height:100px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:11px;margin-top:12px}
.ll{color:#4ade80;margin-bottom:1px}.lw{color:#fbbf24;margin-bottom:1px}.le{color:#f87171;margin-bottom:1px}

/* --- LOADING --- */
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

// ── SUPABASE ────────────────────────────────────────────────────────────────
const SB = supabase.createClient(
  'https://dvknzfhsgnywevhmsgns.supabase.co',
  'sb_publishable_ehMDG_4ohfbN0XDjkvB8_A_yIwdtOgM'
);

// ── STATE ───────────────────────────────────────────────────────────────────
let USER = null;
let CLIENTS = [];

let APP = {
  screen: 'loading',
  cid: null,        // current client id
  tab: 'overview',
  modal: null,
  md: {},           // modal data
  wiz: { step: 0, d: {} },
  disc: {},         // discover state per client
  anal: {},         // sortfeed state per client
  rep: {},          // report state per client
};

// API keys live in localStorage only — device-specific, never sent to Supabase
function getKeys() {
  try { return JSON.parse(localStorage.getItem('hm_keys') || '{}'); } catch(e) { return {}; }
}
function storeKeys(k) {
  localStorage.setItem('hm_keys', JSON.stringify(k));
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(n) { return Number(n || 0).toLocaleString(); }
function fmtK(n) {
  n = Number(n || 0);
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}
function cc() { return CLIENTS.find(function(c) { return c.id === APP.cid; }) || null; }

function set(u) { Object.assign(APP, u); render(); }

function showToast(msg, type) {
  document.querySelectorAll('.toast').forEach(function(e) { e.remove(); });
  var el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'err' ? 'var(--re)' : type === 'warn' ? 'var(--am)' : 'var(--tx)';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3500);
}

function addLog(msg, type) {
  var box = document.querySelector('.log');
  if (!box) return;
  var d = document.createElement('div');
  d.className = type === 'warn' ? 'lw' : type === 'err' ? 'le' : 'll';
  var t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  d.textContent = '[' + t + '] ' + msg;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

// ── SUPABASE DATA ────────────────────────────────────────────────────────────
async function loadClients() {
  var res = await SB.from('clients').select('*').order('created_at', { ascending: true });
  if (res.error) { console.error('loadClients error:', res.error); return; }
  CLIENTS = res.data || [];
}

async function upsertClient(client) {
  // Build payload matching the exact DB schema
  var payload = {
    id: client.id,
    name: client.name || '',
    email: client.email || '',
    ig_handle: client.ig_handle || '',
    niche: client.niche || '',
    target: client.target || '',
    pillars: client.pillars || [],
    hashtags: client.hashtags || [],
    keywords: client.keywords || [],
    platforms: client.platforms || [],
    posting_freq: client.posting_freq || '',
    package: client.package || '',
    notes: client.notes || '',
    color: client.color || '#6B5CE7',
    light: client.light || '#EDE9FF',
    competitors: client.competitors || [],
    reports: client.reports || [],
    owner_id: USER.id
  };

  var res = await SB.from('clients').upsert(payload, { onConflict: 'id' });
  if (res.error) throw new Error(res.error.message);
  await loadClients();
}

async function removeClient(id) {
  var res = await SB.from('clients').delete().eq('id', id);
  if (res.error) throw new Error(res.error.message);
  await loadClients();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  var root = document.getElementById('root');
  if (!root) return;
  // Remove any existing overlays and toasts before re-rendering
  document.querySelectorAll('.ov-bg').forEach(function(e) { e.remove(); });

  if      (APP.screen === 'loading')  root.innerHTML = renderLoading();
  else if (APP.screen === 'login')    root.innerHTML = renderLogin();
  else if (APP.screen === 'dash')     root.innerHTML = renderDash();
  else if (APP.screen === 'wizard')   root.innerHTML = renderWizard();
  else if (APP.screen === 'client')   root.innerHTML = renderClient();
  else if (APP.screen === 'settings') root.innerHTML = renderSettings();

  if (APP.modal) {
    var ov = document.createElement('div');
    ov.className = 'ov-bg';
    ov.innerHTML = buildModal();
    ov.addEventListener('click', function(e) { if (e.target === ov) closeModal(); });
    document.body.appendChild(ov);
  }

  bindEvents();
}

// ── LOADING ──────────────────────────────────────────────────────────────────
function renderLoading() {
  return '<div class="loading">'
    + '<div style="width:40px;height:40px;background:var(--tx);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px">H</div>'
    + '<p class="mu sm-t">Loading...</p>'
    + '</div>';
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
function renderLogin() {
  return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px">'
    + '<div style="width:100%;max-width:340px">'
    + '<div style="text-align:center;margin-bottom:24px">'
    + '<div style="width:44px;height:44px;background:var(--tx);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;margin:0 auto 12px">H</div>'
    + '<h1 style="font-size:19px;margin-bottom:4px">Hypnotiic Media</h1>'
    + '<p class="mu sm-t">Internal tools — authorised access only</p>'
    + '</div>'
    + '<div class="card">'
    + '<div class="fld"><label class="lbl">Email</label><input class="inp" id="l-em" type="email" placeholder="you@hypnotiicmedia.com"></div>'
    + '<div class="fld"><label class="lbl">Password</label><input class="inp" id="l-pw" type="password" placeholder="••••••••"></div>'
    + '<div id="l-err" class="al ae" style="display:none">Incorrect email or password. Contact Max to get access.</div>'
    + '<button class="btn bp" style="width:100%;justify-content:center;margin-top:4px" id="l-btn" onclick="doLogin()">Sign in</button>'
    + '<p class="xs mu" style="text-align:center;margin-top:10px">Contact Max to be added as a user</p>'
    + '</div>'
    + '</div></div>';
}

async function doLogin() {
  var email = (document.getElementById('l-em') || {}).value || '';
  var pass  = (document.getElementById('l-pw') || {}).value || '';
  email = email.trim();
  if (!email || !pass) { showToast('Enter your email and password', 'warn'); return; }

  var btn = document.getElementById('l-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="sp"></span>Signing in...'; }
  var err = document.getElementById('l-err');
  if (err) err.style.display = 'none';

  var res = await SB.auth.signInWithPassword({ email: email, password: pass });
  if (res.error) {
    if (err) err.style.display = 'block';
    if (btn) { btn.disabled = false; btn.innerHTML = 'Sign in'; }
    return;
  }
  USER = res.data.user;
  await loadClients();
  set({ screen: 'dash' });
}

async function doLogout() {
  await SB.auth.signOut();
  USER = null; CLIENTS = [];
  set({ screen: 'login' });
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function renderNav(crumb) {
  var email = USER ? USER.email : '';
  return '<nav class="nav">'
    + '<div class="fc" style="gap:10px">'
    + '<div style="width:30px;height:30px;background:var(--tx);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px">H</div>'
    + '<span style="font-weight:600;font-size:14px">Hypnotiic Media</span>'
    + '<span class="xs mu" style="background:var(--sur2);padding:2px 8px;border-radius:20px">Internal</span>'
    + (crumb ? '<span style="color:var(--bor2)">/</span><span class="sm-t mu">' + crumb + '</span>' : '')
    + '</div>'
    + '<div class="fc" style="gap:8px">'
    + '<span class="xs mu">' + email + '</span>'
    + '<button class="btn bg sm" onclick="set({screen:\'settings\'})">Settings</button>'
    + '<button class="btn bg sm" onclick="set({screen:\'dash\',cid:null})">Dashboard</button>'
    + '<button class="btn bg sm" onclick="doLogout()">Sign out</button>'
    + '</div></nav>';
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash() {
  var cards = CLIENTS.map(function(c) {
    var approved = (c.competitors || []).filter(function(x) { return x.status === 'approved'; }).length;
    return '<button onclick="set({screen:\'client\',cid:\'' + c.id + '\',tab:\'overview\'})"'
      + ' style="text-align:left;padding:20px;border-radius:16px;border:1.5px solid ' + c.color + '30;background:' + c.light + ';cursor:pointer;width:100%;transition:all .15s;display:block"'
      + ' onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 6px 20px rgba(0,0,0,.09)\'"'
      + ' onmouseout="this.style.transform=\'none\';this.style.boxShadow=\'none\'">'
      + '<div class="fc" style="gap:8px;margin-bottom:12px"><div class="dot" style="background:' + c.color + '"></div>'
      + '<span class="bdg" style="background:' + c.color + '20;color:' + c.color + '">' + (c.package || 'Active') + '</span></div>'
      + '<div style="font-size:18px;font-weight:600;margin-bottom:4px">' + c.name + '</div>'
      + '<div class="sm-t mu" style="margin-bottom:10px">' + c.niche + '</div>'
      + '<div class="fc" style="gap:12px">'
      + '<span class="xs" style="color:var(--tx3)">' + approved + ' competitors</span>'
      + '<span class="xs" style="color:var(--tx3)">' + (c.pillars || []).length + ' pillars</span>'
      + '<span class="xs" style="color:var(--tx3)">' + (c.posting_freq || '—') + '</span>'
      + '</div></button>';
  }).join('');

  var keys = getKeys();
  var noKey = !keys.apify
    ? '<div class="al ai" style="margin-top:16px">Add your Apify API key in Settings to enable competitor discovery and monthly reports. <button class="btn bs sm" style="margin-left:8px" onclick="set({screen:\'settings\'})">Settings →</button></div>'
    : '';

  return '<div class="fu">' + renderNav()
    + '<div class="wrap">'
    + '<div class="fb" style="margin-bottom:20px">'
    + '<div><h1 style="margin-bottom:3px">Dashboard</h1><p class="mu sm-t">' + CLIENTS.length + ' active client' + (CLIENTS.length !== 1 ? 's' : '') + '</p></div>'
    + '<button class="btn bp" onclick="startWizard()">+ Add new client</button>'
    + '</div>'
    + '<div class="g3">'
    + cards
    + '<button onclick="startWizard()" style="padding:20px;border-radius:16px;border:2px dashed var(--bor);background:none;cursor:pointer;color:var(--tx3);font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:130px;font-family:inherit;transition:all .15s" onmouseover="this.style.borderColor=\'var(--bor2)\';this.style.color=\'var(--tx2)\'" onmouseout="this.style.borderColor=\'var(--bor)\';this.style.color=\'var(--tx3)\'">'
    + '<span style="font-size:24px;opacity:.4">+</span>Add new client</button>'
    + '</div>'
    + noKey
    + '</div></div>';
}

// ── WIZARD ────────────────────────────────────────────────────────────────────
var COLORS = [
  { color: '#6B5CE7', light: '#EDE9FF', name: 'Purple' },
  { color: '#18A06E', light: '#E3F7EF', name: 'Green' },
  { color: '#2563EB', light: '#EFF6FF', name: 'Blue' },
  { color: '#E05A3A', light: '#FEF0EC', name: 'Coral' },
  { color: '#D97706', light: '#FFFBEB', name: 'Amber' },
  { color: '#DB2777', light: '#FDF2F8', name: 'Pink' }
];
var PKGS  = ['Starter', 'Growth', 'Dominant Expert System'];
var FREQS = ['Daily', '6x per week', '5x per week', '4x per week', '3x per week', '2x per week', 'Weekly'];
var PLATS = ['Instagram', 'TikTok', 'YouTube Shorts', 'Facebook', 'LinkedIn'];
var WSTEPS = ['Basic info', 'Niche', 'Content', 'Search terms', 'Review'];

function startWizard() {
  APP.wiz = {
    step: 0,
    d: {
      name: '', email: '', ig_handle: '', niche: '', target: '',
      pillars: [], hashtags: [], keywords: [], platforms: [],
      posting_freq: '4x per week', package: 'Starter', notes: '',
      color: COLORS[0].color, light: COLORS[0].light
    }
  };
  set({ screen: 'wizard' });
}

function renderWizard() {
  var step = APP.wiz.step;
  var d = APP.wiz.d;

  var stepper = WSTEPS.map(function(s, i) {
    var cls = i < step ? 'dn' : i === step ? 'ac' : '';
    return '<div class="si ' + cls + '"><div class="sdot">' + (i < step ? '✓' : (i + 1)) + '</div>'
      + '<div class="slbl">' + s + '</div></div>';
  }).join('');

  var content = '';
  if (step === 0) content = wizStep0(d);
  if (step === 1) content = wizStep1(d);
  if (step === 2) content = wizStep2(d);
  if (step === 3) content = wizStep3(d);
  if (step === 4) content = wizStep4(d);

  var backBtn = step === 0
    ? '<button class="btn bg sm" onclick="set({screen:\'dash\'})">Cancel</button>'
    : '<button class="btn bs sm" onclick="wizBack()">← Back</button>';

  var nextBtn = step === 4
    ? '<button class="btn bp sm" id="wiz-submit" onclick="wizSubmit()">Create client →</button>'
    : '<button class="btn bp sm" onclick="wizNext()">Next →</button>';

  return '<div class="fu">' + renderNav('New client')
    + '<div class="wrap" style="max-width:600px">'
    + '<div class="fc" style="gap:8px;margin-bottom:20px"><button class="btn bg sm" onclick="set({screen:\'dash\'})">← Cancel</button><h2>Add new client</h2></div>'
    + '<div class="stepper">' + stepper + '</div>'
    + '<div class="card fu"><h3 style="font-size:16px;margin-bottom:18px">' + WSTEPS[step] + '</h3>' + content + '</div>'
    + '<div class="fb" style="margin-top:16px">' + backBtn + nextBtn + '</div>'
    + '</div></div>';
}

function wizStep0(d) {
  var cp = COLORS.map(function(c, i) {
    var border = d.color === c.color ? '3px solid var(--tx)' : '2px solid transparent';
    return '<button type="button" onclick="wizSetColor(' + i + ')" title="' + c.name + '"'
      + ' style="width:26px;height:26px;border-radius:50%;background:' + c.color + ';border:' + border + ';cursor:pointer;transition:border .15s"></button>';
  }).join('');
  var pkgOpts = PKGS.map(function(p) { return '<option' + (d.package === p ? ' selected' : '') + '>' + p + '</option>'; }).join('');
  return '<div class="fld"><label class="lbl">Client name *</label>'
    + '<input class="inp" id="w-name" value="' + esc(d.name) + '" placeholder="e.g. Patrick" oninput="APP.wiz.d.name=this.value"></div>'
    + '<div class="fld"><label class="lbl">Client email</label>'
    + '<input class="inp" id="w-email" type="email" value="' + esc(d.email) + '" placeholder="client@example.com" oninput="APP.wiz.d.email=this.value"></div>'
    + '<div class="fld"><label class="lbl">Instagram handle (no @)</label>'
    + '<input class="inp" id="w-ig" value="' + esc(d.ig_handle) + '" placeholder="username" oninput="APP.wiz.d.ig_handle=this.value.trim().replace(\'@\',\'\')">'
    + '<div class="xs mu" style="margin-top:4px">Used for the monthly performance report</div></div>'
    + '<div class="fld"><label class="lbl">Package</label>'
    + '<select class="inp" onchange="APP.wiz.d.package=this.value">' + pkgOpts + '</select></div>'
    + '<div class="fld"><label class="lbl">Colour</label><div class="fc" style="gap:8px">' + cp + '</div></div>';
}

function wizStep1(d) {
  return '<div class="fld"><label class="lbl">Niche — be specific *</label>'
    + '<input class="inp" id="w-niche" value="' + esc(d.niche) + '" placeholder="e.g. Business coaching for male entrepreneurs aged 25–45" oninput="APP.wiz.d.niche=this.value">'
    + '<div class="xs mu" style="margin-top:4px">The more specific, the better the competitor matching</div></div>'
    + '<div class="fld"><label class="lbl">Target audience</label>'
    + '<textarea class="inp" rows="3" placeholder="Who do they serve? Age, goals, pain points..." oninput="APP.wiz.d.target=this.value">' + esc(d.target) + '</textarea></div>';
}

function wizStep2(d) {
  var pillHtml = pillsHtml(d.pillars, 'wizRmPillar');
  var freqOpts = FREQS.map(function(f) { return '<option' + (d.posting_freq === f ? ' selected' : '') + '>' + f + '</option>'; }).join('');
  var platHtml = PLATS.map(function(pl) {
    var chk = (d.platforms || []).indexOf(pl) >= 0 ? ' checked' : '';
    return '<label class="fc" style="gap:8px;cursor:pointer;font-size:13px">'
      + '<input type="checkbox"' + chk + ' onchange="wizTogglePlat(\'' + pl + '\')" style="width:15px;height:15px;cursor:pointer"> ' + pl + '</label>';
  }).join('');
  return '<div class="fld"><label class="lbl">Content pillars</label>'
    + '<div style="min-height:30px;margin-bottom:8px">' + (pillHtml || '<span class="xs mu">None added yet</span>') + '</div>'
    + '<div class="fc" style="gap:8px"><input class="inp" id="wiz-pill-inp" placeholder="e.g. Mindset, Sales, Leadership" style="flex:1" onkeydown="if(event.key===\'Enter\'){event.preventDefault();wizAddPillar()}">'
    + '<button class="btn bs sm" onclick="wizAddPillar()">Add</button></div></div>'
    + '<div class="fld"><label class="lbl">Posting frequency</label>'
    + '<select class="inp" onchange="APP.wiz.d.posting_freq=this.value">' + freqOpts + '</select></div>'
    + '<div class="fld"><label class="lbl">Platforms</label>'
    + '<div class="fc" style="gap:14px;flex-wrap:wrap">' + platHtml + '</div></div>';
}

function wizStep3(d) {
  var hashHtml = tagsHtml(d.hashtags, 'wizRmHash', true);
  var kwHtml   = tagsHtml(d.keywords,  'wizRmKw',   false);
  return '<p class="sm-t mu" style="margin-bottom:16px;line-height:1.6">These are used by Apify to find competitor accounts on Instagram. Hashtags search tagged posts. Keywords search account bios and names. Use both for best results.</p>'
    + '<div class="fld"><label class="lbl">Hashtags (no # needed)</label>'
    + '<div style="min-height:30px;margin-bottom:8px">' + (hashHtml || '<span class="xs mu">None added yet</span>') + '</div>'
    + '<div class="fc" style="gap:8px"><input class="inp" id="wiz-hash-inp" placeholder="businesscoach, entrepreneurmindset..." style="flex:1" onkeydown="if(event.key===\'Enter\'){event.preventDefault();wizAddHash()}">'

    + '<div class="fld"><label class="lbl">Keywords (phrases to search)</label>'
    + '<div style="min-height:30px;margin-bottom:8px">' + (kwHtml || '<span class="xs mu">None added yet</span>') + '</div>'
    + '<div class="fc" style="gap:8px"><input class="inp" id="wiz-kw-inp" placeholder="business coach, entrepreneur mentor..." style="flex:1" onkeydown="if(event.key===\'Enter\'){event.preventDefault();wizAddKw()}">'
    + '<button class="btn bs sm" onclick="wizAddKw()">Add</button></div>'
    + '<div class="xs mu" style="margin-top:4px">Keywords find competitors whose bios mention these phrases</div></div>';
}

function wizStep4(d) {
  var c = COLORS.find(function(x) { return x.color === d.color; }) || COLORS[0];
  var ph = (d.pillars || []).map(function(p) { return '<span class="pill">' + p + '</span>'; }).join('') || '<span class="xs mu">None</span>';
  var hh = (d.hashtags || []).map(function(h) { return '<span class="pill">#' + h + '</span>'; }).join('') || '<span class="xs mu">None</span>';
  var kh = (d.keywords  || []).map(function(k) { return '<span class="pill">' + k + '</span>'; }).join('') || '<span class="xs mu">None</span>';
  return '<div style="background:' + d.light + ';border-radius:12px;padding:16px;margin-bottom:16px;border:1.5px solid ' + d.color + '30">'

    + '<span class="bdg" style="background:' + d.color + '20;color:' + d.color + '">' + d.package + '</span></div>'
    + '<div style="font-size:18px;font-weight:600;margin-bottom:3px">' + (d.name || 'Client name') + '</div>'
    + '<div class="sm-t mu">' + (d.niche || 'No niche set') + '</div>'
    + (d.ig_handle ? '<div class="xs" style="color:' + d.color + ';margin-top:5px">@' + d.ig_handle + '</div>' : '')
    + '</div>'

// Wizard helpers
function wizAddPillar() {
  var i = document.getElementById('wiz-pill-inp'); if (!i) return;
  var v = i.value.trim(); if (!v) return;
  if (APP.wiz.d.pillars.indexOf(v) < 0) APP.wiz.d.pillars.push(v);
  i.value = ''; render(); setTimeout(function() { var x = document.getElementById('wiz-pill-inp'); if (x) x.focus(); }, 30);
}
function wizRmPillar(v) { APP.wiz.d.pillars = APP.wiz.d.pillars.filter(function(x) { return x !== v; }); render(); }
function wizAddHash() {
  var i = document.getElementById('wiz-hash-inp'); if (!i) return;
  var v = i.value.trim().replace('#', '').replace(/\s/g, ''); if (!v) return;
  if (APP.wiz.d.hashtags.indexOf(v) < 0) APP.wiz.d.hashtags.push(v);
  i.value = ''; render(); setTimeout(function() { var x = document.getElementById('wiz-hash-inp'); if (x) x.focus(); }, 30);
}
function wizRmHash(v) { APP.wiz.d.hashtags = APP.wiz.d.hashtags.filter(function(x) { return x !== v; }); render(); }
function wizAddKw() {
  var i = document.getElementById('wiz-kw-inp'); if (!i) return;
  var v = i.value.trim(); if (!v) return;
  if (APP.wiz.d.keywords.indexOf(v) < 0) APP.wiz.d.keywords.push(v);
  i.value = ''; render(); setTimeout(function() { var x = document.getElementById('wiz-kw-inp'); if (x) x.focus(); }, 30);
}
function wizRmKw(v) { APP.wiz.d.keywords = APP.wiz.d.keywords.filter(function(x) { return x !== v; }); render(); }
function wizTogglePlat(pl) { var ps = APP.wiz.d.platforms; var i = ps.indexOf(pl); if (i >= 0) ps.splice(i, 1); else ps.push(pl); }
function wizSetColor(i) { APP.wiz.d.color = COLORS[i].color; APP.wiz.d.light = COLORS[i].light; render(); }

function wizNext() {
  var d = APP.wiz.d;
  if (APP.wiz.step === 0 && !d.name.trim()) { showToast('Client name is required', 'warn'); return; }
  if (APP.wiz.step === 1 && !d.niche.trim()) { showToast('Niche is required', 'warn'); return; }
  APP.wiz.step++; render();
}
function wizBack() { APP.wiz.step--; render(); }

async function wizSubmit() {
  var d = APP.wiz.d;
  if (!d.name.trim()) { showToast('Client name is required', 'warn'); return; }
  var btn = document.getElementById('wiz-submit');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="sp"></span>Saving...'; }
  try {
    var newClient = {
      id: d.name.toLowerCase().replace(/\s+/g, '-') + '-' + uid(),
      name: d.name, email: d.email, ig_handle: d.ig_handle,
      niche: d.niche, target: d.target,
      pillars: d.pillars, hashtags: d.hashtags, keywords: d.keywords,
      platforms: d.platforms, posting_freq: d.posting_freq,
      package: d.package, notes: d.notes,
      color: d.color, light: d.light,
      competitors: [], reports: []
    };
    await upsertClient(newClient);
    showToast(d.name + ' added successfully!');
    set({ screen: 'dash' });
  } catch (err) {
    showToast('Error saving client: ' + err.message, 'err');
    if (btn) { btn.disabled = false; btn.innerHTML = 'Create client →'; }
  }
}

async function deleteClient(id) {
  if (!confirm('Delete this client and all their data? This cannot be undone.')) return;
  try { await removeClient(id); set({ screen: 'dash', cid: null }); showToast('Client deleted'); }
  catch (err) { showToast('Error: ' + err.message, 'err'); }
}

      + '<td><div class="fc" style="gap:8px"><span style="font-weight:700;color:' + scColor(a.score || 0) + ';font-size:14px">' + (a.score || '—') + '</span>'
      + '<div class="sbar" style="width:48px"><div class="sfill" style="width:' + (a.score || 0) + '%;background:' + scColor(a.score || 0) + '"></div></div></div></td>'

      + '<td>' + (a.best_views ? fmtK(a.best_views) : '—') + '</td>'

      ? '<div class="al aw">' + pending.length + ' account' + (pending.length > 1 ? 's' : '') + ' pending review — approve or remove below</div>'

      + '<div style="overflow-x:auto;margin-bottom:20px"><table>'
      + '<thead><tr><th>Account</th><th>Followers</th><th>Score /100</th><th>Viral posts</th><th>Best views</th><th>Action</th></tr></thead>'
      + '<tbody>' + pending.map(function(a) { return row(a, true); }).join('') + '</tbody>'
      + '</table></div>' : '')

    + (approved.length
      ? '<div style="overflow-x:auto"><table>'
        + '<thead><tr><th>Account</th><th>Followers</th><th>Score /100</th><th>Viral posts</th><th>Best views</th><th>Action</th></tr></thead>'

    + '<div class="dz" id="comp-dz" ondragover="event.preventDefault();this.classList.add(\'ov\')" ondragleave="this.classList.remove(\'ov\')" ondrop="compDrop(event,\'' + c.id + '\')">'
    + '<p class="sm-t mu" style="margin-bottom:8px">Drop CSV here</p>'

async function approveComp(cid, username) {
  var c = CLIENTS.find(function(x) { return x.id === cid; }); if (!c) return;
  c.competitors = c.competitors.map(function(x) { return x.username === username ? Object.assign({}, x, { status: 'approved' }) : x; });
  try { await upsertClient(c); render(); showToast('@' + username + ' approved'); }
  catch (err) { showToast('Error: ' + err.message, 'err'); }
}

async function removeComp(cid, username) {
  if (!confirm('Remove @' + username + ' from competitors?')) return;
  var c = CLIENTS.find(function(x) { return x.id === cid; }); if (!c) return;
  c.competitors = c.competitors.filter(function(x) { return x.username !== username; });
  try { await upsertClient(c); render(); showToast('Removed'); }
  catch (err) { showToast('Error: ' + err.message, 'err'); }
}

function compDrop(e, cid) {
  e.preventDefault();
  var dz = document.getElementById('comp-dz'); if (dz) dz.classList.remove('ov');
  var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) parseCompCSV(f, cid);
}
function compFileInput(e, cid) {
  var f = e.target && e.target.files && e.target.files[0];
  if (f) parseCompCSV(f, cid);
}

function parseCompCSV(file, cid) {
  var reader = new FileReader();
  reader.onload = async function(ev) {
    var lines = ev.target.result.trim().split('\n');
    if (lines.length < 2) { showToast('CSV is empty or has no data rows', 'warn'); return; }
    var headers = lines[0].toLowerCase().split(',').map(function(h) { return h.trim().replace(/"/g, ''); });
    var uCol = headers.findIndex(function(h) { return ['username','handle','account','user'].some(function(p) { return h.indexOf(p) >= 0; }); });
    var fCol = headers.findIndex(function(h) { return h.indexOf('follow') >= 0; });
    if (uCol < 0) { showToast('CSV needs a username or handle column', 'err'); return; }
    var c = CLIENTS.find(function(x) { return x.id === cid; }); if (!c) return;
    var added = 0;
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',').map(function(x) { return x.trim().replace(/"/g, '').replace('@', ''); });
      var u = cols[uCol] && cols[uCol].trim();
      if (!u || u.length < 2) continue;
      if (c.competitors.find(function(x) { return x.username === u; })) continue;
      c.competitors.push({ username: u, status: 'pending', followers: fCol >= 0 ? (parseInt(cols[fCol].replace(/,/g,'')) || 0) : 0, score: 0, viral_posts: 0, best_views: 0 });
      added++;
    }
    try { await upsertClient(c); render(); showToast(added + ' competitor' + (added !== 1 ? 's' : '') + ' uploaded — review and approve above'); }
    catch (err) { showToast('Error saving: ' + err.message, 'err'); }
  };
  reader.readAsText(file);
}

async function realDiscover(cid, c, token) {
  var accounts = {};
  var log = function(m, t) { APP.disc[cid].progress = m; render(); addLog(m, t); };

  // Search hashtags
  var hashtags = (c.hashtags || []).slice(0, 4);
  for (var hi = 0; hi < hashtags.length; hi++) {
    var tag = hashtags[hi];
    log('Scraping #' + tag + '...');
    try {
      var startRes = await fetch('https://api.apify.com/v2/acts/apify~instagram-hashtag-scraper/runs?token=' + token, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hashtags: [tag], resultsLimit: 30, addParentData: true })
      });
      if (!startRes.ok) { log('Hashtag #' + tag + ' failed to start', 'warn'); continue; }
      var startData = await startRes.json();
      var runId = startData && startData.data && startData.data.id;
      if (!runId) { log('No run ID for #' + tag, 'warn'); continue; }

      var dsId = await pollRun(runId, token, log);
      if (!dsId) { log('#' + tag + ' timed out', 'warn'); continue; }

      var itemsRes = await fetch('https://api.apify.com/v2/datasets/' + dsId + '/items?token=' + token);
      var items = await itemsRes.json();
      if (!Array.isArray(items)) continue;

      for (var j = 0; j < items.length; j++) {
        var item = items[j];
        var u = item && item.ownerUsername;
        if (!u || accounts[u]) continue;
        var f = item.ownerFollowersCount || 0;
        if (f < 3000 || f > 3000000) continue;
        var likes = item.likesCount || 0;
        var comments = item.commentsCount || 0;
        var eng = f > 0 ? ((likes + comments) / f * 100) : 0;
        if (eng < 0.2 || eng > 20) continue;
        accounts[u] = { username: u, followers: f, bio: item.ownerBio || '', fullName: item.ownerFullName || '', engagement: Math.round(eng * 100) / 100 };
      }
      log('Total accounts found so far: ' + Object.keys(accounts).length);
    } catch (e) { log('Error on #' + tag + ': ' + e.message, 'warn'); }
  }

  log('Scoring ' + Object.keys(accounts).length + ' accounts...');

  // Score accounts
  var kwList = [(c.niche || '').toLowerCase()]
    .concat((c.pillars || []).map(function(p) { return p.toLowerCase(); }))
    .concat((c.keywords || []).map(function(k) { return k.toLowerCase(); }));

  var scored = Object.values(accounts).map(function(a) {
    var bio = (a.bio + ' ' + a.fullName).toLowerCase();
    var ns = 0;
    kwList.forEach(function(kw) { if (kw.length > 3 && bio.indexOf(kw) >= 0) ns += 3; });
    ns = Math.min(ns, 35);
    var es = a.engagement >= 3 ? 40 : a.engagement >= 1.5 ? 30 : a.engagement >= 0.8 ? 20 : 10;
    var fs = (a.followers >= 10000 && a.followers <= 500000) ? 15 : a.followers >= 5000 ? 8 : 3;
    return {
      username: a.username, followers: a.followers,
      score: Math.min(Math.round(es + ns + fs), 100),
      viral_posts: Math.max(1, Math.floor(a.engagement / 2)),
      best_views: Math.floor(a.followers * a.engagement / 100 * 8)
    };
  }).sort(function(a, b) { return b.score - a.score; }).slice(0, 10);

  APP.disc[cid].running = false;
  APP.disc[cid].results = scored;
  render();
  showToast('Discovery complete — ' + scored.length + ' competitors found');
}

async function pollRun(runId, token, log) {
  for (var i = 0; i < 60; i++) {
    await sleep(5000);
    try {
      var r = await fetch('https://api.apify.com/v2/actor-runs/' + runId + '?token=' + token);
      var d = await r.json();
      var status = d && d.data && d.data.status;
      if (log) log('Status: ' + status);
      if (status === 'SUCCEEDED') return d.data.defaultDatasetId;
      if (status === 'FAILED' || status === 'ABORTED' || status === 'TIMED-OUT') return null;
    } catch (e) { /* keep polling */ }
  }
  return null;
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function discAdd(cid, username, followers, score, viral_posts, best_views) {
  var c = CLIENTS.find(function(x) { return x.id === cid; }); if (!c) return;
  if (c.competitors.find(function(x) { return x.username === username; })) { showToast('Already in list', 'warn'); return; }
  c.competitors.push({ username: username, followers: followers, score: score, viral_posts: viral_posts, best_views: best_views, status: 'approved' });
  if (APP.disc[cid] && APP.disc[cid].results) {
    APP.disc[cid].results = APP.disc[cid].results.filter(function(x) { return x.username !== username; });
  }
  try { await upsertClient(c); render(); showToast('@' + username + ' added and approved'); }
  catch (err) { showToast('Error: ' + err.message, 'err'); }
}

async function discAddAll(cid) {
  var c = CLIENTS.find(function(x) { return x.id === cid; });
  var results = (APP.disc[cid] && APP.disc[cid].results) || [];
  if (!c || !results.length) return;
  var added = 0;
  results.forEach(function(a) {
    if (!c.competitors.find(function(x) { return x.username === a.username; })) {
      c.competitors.push(Object.assign({}, a, { status: 'approved' }));
      added++;
    }
  });
  APP.disc[cid].results = [];
  try { await upsertClient(c); render(); showToast(added + ' competitors added and approved'); }
  catch (err) { showToast('Error: ' + err.message, 'err'); }
}

async function runReport(cid) {
  var keys = getKeys();
  if (!keys.apify) { showToast('Add your Apify API key in Settings first', 'warn'); return; }
  var c = CLIENTS.find(function(x) { return x.id === cid; });
  if (!c || !c.ig_handle) { showToast('No Instagram handle set for this client', 'warn'); return; }

  if (!APP.rep[cid]) APP.rep[cid] = {};
  var month = (document.getElementById('rep-month') || {}).value || new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
  var notes = (document.getElementById('rep-notes') || {}).value || '';
  APP.rep[cid].month = month;
  APP.rep[cid].notes = notes;
  APP.rep[cid].running = true;
  APP.rep[cid].data = null;
  render();

  try {
    var token = keys.apify;
    // Start Apify run to scrape client's own Instagram posts
    var startRes = await fetch('https://api.apify.com/v2/acts/apify~instagram-scraper/runs?token=' + token, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ directUrls: ['https://www.instagram.com/' + c.ig_handle + '/'], resultsType: 'posts', resultsLimit: 40, addParentData: true })
    });
    if (!startRes.ok) throw new Error('Apify error: ' + startRes.status);
    var startData = await startRes.json();
    var runId = startData && startData.data && startData.data.id;
    if (!runId) throw new Error('No run ID returned');

    var dsId = await pollRun(runId, token, null);
    if (!dsId) throw new Error('Apify run timed out');

    var itemsRes = await fetch('https://api.apify.com/v2/datasets/' + dsId + '/items?token=' + token);
    var items = await itemsRes.json();
    if (!Array.isArray(items) || items.length === 0) throw new Error('No posts returned from Apify');

    // Filter to last 30 days
    var ago = new Date(); ago.setDate(ago.getDate() - 30);
    var posts30 = items.filter(function(p) {
      try { return new Date(p.timestamp) >= ago; } catch(e) { return true; }
    });
    var allPosts = posts30.length > 0 ? posts30 : items.slice(0, 30);

    var totalViews    = allPosts.reduce(function(s, p) { return s + (p.videoViewCount || 0); }, 0);
    var totalLikes    = allPosts.reduce(function(s, p) { return s + (p.likesCount || 0); }, 0);
    var totalComments = allPosts.reduce(function(s, p) { return s + (p.commentsCount || 0); }, 0);
    var followers     = (allPosts[0] && allPosts[0].ownerFollowersCount) || 1;
    var avgViews    = allPosts.length ? Math.round(totalViews / allPosts.length) : 0;
    var avgLikes    = allPosts.length ? Math.round(totalLikes / allPosts.length) : 0;
    var avgComments = allPosts.length ? Math.round(totalComments / allPosts.length) : 0;
    var engRate = ((avgLikes + avgComments) / followers * 100).toFixed(2);

    var topPosts = allPosts.map(function(p) {
      return {
        type: (p.type === 'Video' || p.type === 'Reel') ? 'Reel' : p.type === 'Sidecar' ? 'Carousel' : 'Image',
        views: p.videoViewCount || 0,
        likes: p.likesCount || 0
      };
    }).sort(function(a, b) { return (b.views || b.likes) - (a.views || a.likes); }).slice(0, 6);

    APP.rep[cid].running = false;
    APP.rep[cid].data = {
      month: month, notes: notes,
      total_posts: allPosts.length,
      total_views: totalViews, total_likes: totalLikes, total_comments: totalComments,
      avg_views_reel: avgViews, avg_likes: avgLikes, avg_comments: avgComments,
      engagement_rate: engRate,
      top_posts: topPosts,
      insights: [
        'Published ' + allPosts.length + ' posts in the last 30 days — ' + (allPosts.length / 4).toFixed(1) + ' per week on average',
        'Reels averaged ' + fmtK(avgViews) + ' views per post',
        'Engagement rate of ' + engRate + '% — ' + (Number(engRate) >= 2 ? 'above' : 'building toward') + ' the 2% industry benchmark',
        'Total of ' + fmtK(totalComments) + ' comments this month — ' + (Number(engRate) >= 1 ? 'audience is engaging not just watching' : 'focus on hooks that invite responses'),
        'Best performing post achieved ' + fmtK(topPosts[0] ? (topPosts[0].views || topPosts[0].likes) : 0) + ' ' + (topPosts[0] && topPosts[0].type === 'Reel' ? 'views' : 'likes')
      ]
    };
    render();
    showToast('Report built from real Instagram data');
  } catch (err) {
    APP.rep[cid].running = false;
    render();
    showToast('Report error: ' + err.message, 'err');
  }
}

function editRmHash(v) { APP.md.hashtags = APP.md.hashtags.filter(function(x) { return x !== v; }); render(); }
function editAddKw() { var i = document.getElementById('ec-kw'); if (!i) return; var v = i.value.trim(); if (!v) return; if (APP.md.keywords.indexOf(v) < 0) APP.md.keywords.push(v); i.value = ''; render(); setTimeout(function() { var x = document.getElementById('ec-kw'); if (x) x.focus(); }, 30); }

// ── SHARED HELPERS ────────────────────────────────────────────────────────────
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function pillsHtml(arr, rmFn) {
  return (arr || []).map(function(p) {
    return '<span class="pill">' + esc(p) + '<button class="px" onclick="' + rmFn + '(\'' + esc(p) + '\')">×</button></span>';
  }).join('');
}

function tagsHtml(arr, rmFn, isHash) {
  return (arr || []).map(function(t) {
    var display = isHash ? '#' + t : t;
    return '<span class="pill">' + esc(display) + '<button class="px" onclick="' + rmFn + '(\'' + esc(t) + '\')">×</button></span>';
  }).join('');
}

// ── BIND ──────────────────────────────────────────────────────────────────────
function bindEvents() {
  var lPass = document.getElementById('l-pw');
  if (lPass) {
    lPass.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  }
  var lEmail = document.getElementById('l-em');
  if (lEmail) {
    lEmail.addEventListener('keydown', function(e) { if (e.key === 'Enter') { var pw = document.getElementById('l-pw'); if (pw) pw.focus(); } });
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  render(); // show loading screen immediately

  // Check for existing session
  var sessionRes = await SB.auth.getSession();
  var session = sessionRes && sessionRes.data && sessionRes.data.session;

  if (session && session.user) {
    USER = session.user;
    await loadClients();
    set({ screen: 'dash' });
  } else {
    set({ screen: 'login' });
  }

  // Keep session in sync
  SB.auth.onAuthStateChange(async function(event, session) {
    if (event === 'SIGNED_IN' && session && session.user) {
      USER = session.user;
      await loadClients();
      set({ screen: 'dash' });
    } else if (event === 'SIGNED_OUT') {
      USER = null; CLIENTS = [];
      set({ screen: 'login' });
    }
  });
}

init();
